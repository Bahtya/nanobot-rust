name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: sudo apt-get install -y protobuf-compiler mold clang
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  clippy-windows:
    name: Clippy (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Disable Windows Defender real-time scanning
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Install protobuf compiler
        run: choco install protoc
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  build-windows:
    name: Build & Test (Windows, ${{ matrix.shard }}/2)
    runs-on: windows-latest
    strategy:
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Disable Windows Defender real-time scanning
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Install protobuf compiler
        run: choco install protoc
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Run tests
        run: cargo nextest run --workspace --partition "count:${{ matrix.shard }}/2"

  test:
    name: Test (${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space (conditional)
        run: |
          usage=$(df / --output=pcent | tail -1 | tr -d '%')
          if [ "$usage" -gt 80 ]; then
            echo "Disk usage at ${usage}% — cleaning up large unused packages..."
            sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost 2>/dev/null || true
            sudo apt-get clean 2>/dev/null || true
            df -h / | tail -1
          else
            echo "Disk usage at ${usage}% — no cleanup needed."
          fi

      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get install -y protobuf-compiler mold clang
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace --partition "count:${{ matrix.shard }}/2"

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  merge-conflict-check:
    name: Merge Conflict Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect merge conflicts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git fetch origin "${BASE_REF}"
          git checkout "origin/${BASE_REF}"
          git merge --no-commit --no-ff "origin/${HEAD_REF}" 2>/dev/null || true

          conflicts=$(git diff --name-only --diff-filter=U 2>/dev/null)

          git merge --abort 2>/dev/null || true

          if [ -n "$conflicts" ]; then
            echo "::error::Merge conflicts detected"
            conflict_list="  - ${conflicts//$'\n'/$'\n'  - }"
            gh pr comment "$PR_NUMBER" --body ":warning: **Merge conflicts detected with \`${BASE_REF}\`**

            Conflicting files:
            ${conflict_list}

            Please resolve these conflicts before merging."
            exit 1
          else
            echo "No merge conflicts detected."
          fi
